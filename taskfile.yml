version: '3'

vars:
  CLUSTER: dapl-prd-htz-fsn-app

tasks:
  # Packer
  packer:init:
    dir: packer/hetzner-talos
    cmds:
      - packer init .

  packer:build:
    dir: packer/hetzner-talos
    cmds:
      - packer build -var-file=variables.pkrvars.hcl .

  # OpenTofu
  tofu:init:
    dir: tofu/hetzner
    cmds:
      - tofu init

  tofu:plan:
    dir: tofu/hetzner
    cmds:
      - tofu plan

  tofu:apply:
    dir: tofu/hetzner
    cmds:
      - tofu apply

  # Flux
  flux:reconcile:
    cmds:
      - flux reconcile source git flux-system
      - flux reconcile kustomization infra-sources
      - flux reconcile kustomization infra-controllers
      - flux reconcile kustomization infra-configs
      - flux reconcile kustomization apps
