---
apiVersion: v1
kind: Service
metadata:
  name: kube-api
  namespace: netbird
  annotations:
    netbird.io/expose: "true"
    netbird.io/groups: "admins"
    netbird.io/resource-name: "kube.htz.prd.dapleo.internal"
spec:
  ports:
    - port: 6443
      targetPort: 6443
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kube-api
  namespace: netbird
subsets:
  - addresses:
      - ip: 172.16.16.7
      - ip: 172.16.16.5
      - ip: 172.16.16.8
    ports:
      - port: 6443
        protocol: TCP
