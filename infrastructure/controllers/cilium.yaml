---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.17.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    ipam:
      mode: kubernetes
    cluster:
      id: 1
      name: dapl-prd-htz-fsn-app
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 7445
    routingMode: tunnel
    tunnelProtocol: geneve
    hubble:
      enabled: true
      relay:
        enabled: true
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
