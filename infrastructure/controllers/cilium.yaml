---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  targetNamespace: kube-system
  releaseName: cilium
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.19.x"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    priorityClassName: critical
    ipam:
      mode: kubernetes
    cluster:
      id: 1
      name: dapl-prd-htz-fsn-app
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 7445
    routingMode: tunnel
    tunnelProtocol: geneve
    operator:
      priorityClassName: critical
    hubble:
      enabled: true
      relay:
        enabled: true
        priorityClassName: critical
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
