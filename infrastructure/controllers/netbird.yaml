---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator
  namespace: netbird
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 1h
  chart:
    spec:
      chart: kubernetes-operator
      version: "0.2.x"
      sourceRef:
        kind: HelmRepository
        name: netbird
        namespace: flux-system
  values:
    netbirdAPI:
      keyFromSecret:
        name: netbird-api-token
        key: NB_API_KEY
    cluster:
      name: dapl-prd-htz-fsn-app
