---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator
  namespace: flux-system
spec:
  targetNamespace: netbird
  releaseName: netbird-operator
  install:
    createNamespace: true
  dependsOn:
    - name: cert-manager
  interval: 1h
  chart:
    spec:
      chart: kubernetes-operator
      version: "0.3.x"
      sourceRef:
        kind: HelmRepository
        name: netbird
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: high
  values:
    netbirdAPI:
      keyFromSecret:
        name: netbird-api-token
        key: NB_API_KEY
    ingress:
      enabled: true
      router:
        enabled: false
      allowAutomaticPolicyCreation: false
    cluster:
      name: dmn-fsn-tools
