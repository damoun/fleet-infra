---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: flux-system
spec:
  targetNamespace: kube-system
  releaseName: descheduler
  interval: 1h
  chart:
    spec:
      chart: descheduler
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: flux-system
  values:
    schedule: "*/10 * * * *"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: null
        memory: 128Mi
